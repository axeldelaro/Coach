<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Protocol Écorché</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff3b30">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23050505'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='%23ff3b30' font-family='sans-serif' font-weight='bold'%3EC%3C/text%3E%3C/svg%3E">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505; --card: rgba(20, 20, 20, 0.8); --card-solid: #111; 
            --border: rgba(255, 255, 255, 0.1); --accent: #ff3b30; --accent-glow: rgba(255, 59, 48, 0.2);
            --text: #f0f0f0; --muted: #888;
        }
        
        /* ARCHITECTURE FLEXBOX STRICTE (Anti-débordement) */
        html, body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100%; height: 100dvh; overflow: hidden; width: 100vw; -webkit-tap-highlight-color: transparent; }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { display: none; }
        
        #root { display: flex; flex-direction: column; height: 100%; width: 100%; }
        
        .app-header { flex: 0 0 auto; background: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, var(--bg) 80%); padding: calc(15px + env(safe-area-inset-top)) 20px 15px; border-bottom: 1px solid var(--border); z-index: 10; }
        
        .app-content { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 15px; width: 100%; max-width: 600px; margin: 0 auto; }
        
        .app-nav { flex: 0 0 auto; background: rgba(5,5,5,0.95); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); z-index: 10; }
        
        /* Typographie et Composants */
        .title { font-family: 'Oswald', sans-serif; font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -1px; text-transform: uppercase; line-height: 1; }
        .subtitle { font-size: 11px; letter-spacing: 3px; color: var(--accent); font-weight: 900; text-transform: uppercase; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; width: 100%; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .quote-box { border-left: 4px solid var(--accent); padding-left: 12px; margin: 10px 0 15px; font-style: italic; color: #ccc; font-size: 12px; line-height: 1.5; }
        
        /* Accordéons compacts */
        .accordion { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; transition: border-color 0.2s; }
        .accordion-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; cursor: pointer; font-size: 14px; }
        .accordion-body { padding: 0 16px 14px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 5px; padding-top: 12px; animation: fadeIn 0.2s; }
        
        /* Carrousel Jours */
        .day-picker { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 5px; flex-shrink: 0; }
        .day-pill { padding: 10px 18px; background: var(--card-solid); border: 1px solid var(--border); border-radius: 20px; font-weight: 700; font-size: 12px; white-space: nowrap; cursor: pointer; color: var(--muted); transition: 0.2s; }
        .day-pill.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

        /* Boutons de Navigation */
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: 1px; transition: 0.2s; cursor: pointer; width: 20%; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
        
        /* Formulaires */
        input[type=range], input[type=number], input[type=text] { width: 100%; background: var(--card-solid); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; font-family: 'Inter'; font-size: 14px; outline: none; }
        input[type=range] { -webkit-appearance: none; background: transparent; padding: 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 6px; background: var(--accent); cursor: pointer; margin-top: -10px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; border-radius: 2px; background: var(--border); }
        
        .btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        
        .theme-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; display: inline-block; margin-right: 8px; margin-bottom: 8px; transition: 0.2s; }
        .theme-btn.active { transform: scale(1.15); border-color: #fff; }
        
        /* Switch iOS style */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--card-solid); transition: .3s; border-radius: 34px; border: 1px solid var(--border); }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: var(--muted); transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-glow); border-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: var(--accent); }

        /* Progress Bar */
        .progress-container { width: 100%; background: var(--card-solid); border-radius: 10px; height: 6px; overflow: hidden; margin-top: 8px; border: 1px solid var(--border); }
        .progress-bar { height: 100%; background: var(--accent); transition: width 0.3s ease; }

        /* Modales */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: flex; justify-content: center; align-items: center; padding: 15px; animation: fadeIn 0.2s; }
        .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 400px; padding: 20px; max-height: 85vh; overflow-y: auto; }
        
        /* Séance Active */
        .active-workout-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; }
        .aw-header { flex: 0 0 auto; padding: calc(15px + env(safe-area-inset-top)) 15px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .aw-content { flex: 1 1 auto; overflow-y: auto; padding: 15px; }
        .aw-footer { flex: 0 0 auto; padding: 15px calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: var(--bg); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Gouttes d'eau */
        .water-drop { font-size: 22px; filter: grayscale(1); opacity: 0.3; transition: 0.2s; cursor: pointer; }
        .water-drop.active { filter: grayscale(0); opacity: 1; transform: scale(1.1); }
        
        /* Boutons Courses */
        .action-btn { background: var(--card-solid); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px 12px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .action-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AUDIO ENGINE ---
        const playBeep = (freq, vol = 0.5, duration = 0.2) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "square";
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(vol, ctx.currentTime);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        };

        // --- CONSTANTES ---
        const THEMES = ["#ff3b30", "#30d158", "#0a84ff", "#e8ff00", "#bf5af2", "#ffffff"];
        
        const EXERCISES_DB = {
            "Tractions": { muscles: "Grand dorsal, Biceps", tempo: "1s montée, 1s pause, 3s descente.", error: "Kipping (élan des jambes)." },
            "Tirage dos inversé": { muscles: "Épaisseur du dos", tempo: "Explosif montée, 2s maintien.", error: "Casser l'alignement hanches/dos." },
            "Pompes": { muscles: "Pectoraux, Triceps", tempo: "2s descente, pause 1s ras du sol.", error: "Bassin qui tombe." },
            "Dips": { muscles: "Triceps, Pectoraux inférieurs", tempo: "3s descente contrôlée.", error: "Descendre trop bas sans mobilité." },
            "Fentes Bulgares": { muscles: "Quadriceps, Fessiers", tempo: "3s descente, maintien 1s en bas.", error: "Genou qui rentre vers l'intérieur." },
            "Roulette Abdos": { muscles: "Sangle abdominale", tempo: "Aller-retour contrôlé.", error: "Creuser les lombaires (rétroverse le bassin !)." },
            "Planche": { muscles: "Gainage global", tempo: "Isométrique statique", error: "Fesses en l'air ou dos creux." },
            "Relevés de jambes": { muscles: "Grand droit", tempo: "Lent à la descente.", error: "Utiliser l'élan." },
            "Dragon flag": { muscles: "Core complet", tempo: "Contrôle total à la descente.", error: "Plier les genoux pour compenser." },
            "Muscle-up négatifs": { muscles: "Haut du corps", tempo: "Phase descente (4s) uniquement.", error: "Se laisser tomber." },
            "Pike push-ups": { muscles: "Épaules", tempo: "2s descente.", error: "Regarder ses mains au lieu de ses pieds." },
            "Sprints": { muscles: "Cardio, Jambes", tempo: "Effort maximal.", error: "Mauvais échauffement." },
            "Face Pulls": { muscles: "Coiffe des rotateurs", tempo: "Tirer vers les yeux.", error: "Mettre trop lourd." }
        };

        const ALTERNATIVES = {
            "Blanc de poulet": ["Tofu ferme 🌱", "Steaks hachés 5% 🥩", "Seitan 🌾"],
            "Thon au naturel": ["Maquereaux au naturel 🐟", "Saumon en conserve 🍣"],
            "Fromage blanc 0%": ["Yaourt Soja nature 🌱", "Petit suisse 0% 🥄"],
            "Whey isolate": ["Protéine végétale 🥤", "Viande des grisons 🥩"],
            "Riz basmati": ["Quinoa 🌾", "Boulgour 🌾", "Semoule complète 🍚"],
            "Flocons d'avoine": ["Crème de riz 🍚", "Flocons de sarrasin 🌾"],
            "Lentilles vertes": ["Pois chiches 🫘", "Haricots rouges 🫘", "Pâtes complètes 🍝"],
            "Brocolis surgelés": ["Chou-fleur 🥦", "Haricots verts 🫛"],
            "Épinards surgelés": ["Blettes 🥬", "Poireaux 🥬"],
            "Crudités mixtes": ["Cœur de palmier 🌴", "Radis & Asperges 🥒"],
            "Amandes natures": ["Noix de cajou 🥜", "Noix de Grenoble 🌰", "Beurre de cacahuète 🥜"],
            "Huile d'olive": ["Huile de colza 🫙", "Huile de noix 🫙"],
            "Café ou Thé": ["Kombucha 🍹", "Infusion ☕", "Maté 🍵"]
        };

        const COOKING_METHODS = {
            "Blanc de poulet": "Cuiseur vapeur 15 min ou poêle sans huile à feu moyen. Saler après.",
            "Tofu ferme": "Presser, couper en dés, dorer à la poêle avec un trait de sauce soja.",
            "Steaks hachés 5%": "Poêle très chaude, 2 min par face. Zéro matière grasse.",
            "Seitan": "En tranches fines, faire revenir avec un peu d'eau pour éviter qu'il sèche.",
            "Thon au naturel": "Égoutter, émietter avec du jus de citron. Sans cuisson.",
            "Maquereaux au naturel": "Écraser avec un peu de moutarde et jus de citron.",
            "Saumon en conserve": "Égoutter et arroser de citron.",
            "Riz basmati": "1 vol riz / 2 vol eau. Ébullition, puis feu très doux à couvert (12 min).",
            "Quinoa": "Rincer abondamment. 1 vol quinoa / 2 vol eau. Cuire 15 min à feu doux.",
            "Boulgour": "1 vol boulgour / 2 vol eau bouillante. Cuire 10 min.",
            "Semoule complète": "Couvrir d'eau bouillante, laisser gonfler 5 min à couvert.",
            "Pâtes complètes": "Cuisson al dente dans un grand volume d'eau bouillante salée.",
            "Lentilles vertes": "Départ eau froide, sans sel. Cuire 25 min.",
            "Pois chiches": "Rincer si en bocal. Poêler avec cumin et paprika.",
            "Brocolis surgelés": "Vapeur 5-7 min ou micro-ondes. Garder croquant.",
            "Chou-fleur": "Vapeur 8 min, puis écraser en purée légère.",
            "Épinards surgelés": "Feu doux à la poêle couverte. Ajouter de l'ail en poudre.",
            "Blettes": "Séparer le blanc (vapeur 10min) du vert (tombé à la poêle 3min)."
        };

        const Accordion = ({ title, icon, isOpen, onClick, children }) => (
            <div className="accordion" style={{borderColor: isOpen ? 'var(--accent)' : 'var(--border)'}}>
                <div className="accordion-header" onClick={onClick}>
                    <div style={{display: 'flex', alignItems: 'center', gap: 10}}><span style={{fontSize: 18}}>{icon}</span> <span>{title}</span></div>
                    <span style={{color: isOpen ? 'var(--accent)' : 'var(--muted)', transform: isOpen ? 'rotate(180deg)' : 'none', transition: '0.3s'}}>▼</span>
                </div>
                {isOpen && <div className="accordion-body">{children}</div>}
            </div>
        );

        function App() {
            // STATE GLOBAL
            const [currentProfileId, setCurrentProfileId] = useState("profil1");
            const [tab, setTab] = useState("home"); 
            
            const [profile, setProfile] = useState({ name: "Marc", weight: 63, maxPullups: 20, maxPushups: 50, theme: "#ff3b30", equip: { pullupBar: true, vest: true, band: true, abWheel: true } });
            const [iaState, setIaState] = useState({ cal_mult: 1.0, rep_mult: 1.0 });
            const [streak, setStreak] = useState(0);
            const [lastLog, setLastLog] = useState("");
            const [water, setWater] = useState(0);
            const [groceryPrefs, setGroceryPrefs] = useState({}); // { "id": { altIdx: 0, isEditing: false } }
            
            // UI STATES
            const [fastingProgress, setFastingProgress] = useState({ percent: 0, status: "", color: "" });
            const [batchCook, setBatchCook] = useState(false);
            const [modalInfo, setModalInfo] = useState(null);
            const [activeWorkout, setActiveWorkout] = useState(null);

            const [openAccordion, setOpenAccordion] = useState(null); // Gère l'ouverture unique
            const [selectedDay, setSelectedDay] = useState(new Date().getDay() === 0 ? 6 : new Date().getDay() - 1);

            // INITIALISATION ET SAUVEGARDE
            useEffect(() => {
                try {
                    const saved = localStorage.getItem(`coach_app_${currentProfileId}`);
                    if (saved) {
                        const p = JSON.parse(saved);
                        setProfile(p.profile || profile); setIaState(p.iaState || { cal_mult: 1.0, rep_mult: 1.0 });
                        setStreak(p.streak || 0); setLastLog(p.lastLog || ""); setGroceryPrefs(p.groceryPrefs || {});
                        setWater((p.lastLog !== new Date().toDateString() && p.waterDate !== new Date().toDateString()) ? 0 : (p.water || 0));
                    } else if(currentProfileId === "profil2") {
                        setProfile({ name: "Léa", weight: 55, maxPullups: 0, maxPushups: 10, theme: "#bf5af2", equip: { pullupBar: false, vest: false, band: true, abWheel: false }});
                        setStreak(0); setWater(0); setGroceryPrefs({});
                    }
                } catch(e) {}
            }, [currentProfileId]);

            useEffect(() => {
                try {
                    localStorage.setItem(`coach_app_${currentProfileId}`, JSON.stringify({ profile, iaState, streak, lastLog, water, groceryPrefs, waterDate: new Date().toDateString() }));
                    
                    document.documentElement.style.setProperty('--accent', profile.theme);
                    let hex = profile.theme.replace('#', '');
                    if(hex.length === 6) {
                        document.documentElement.style.setProperty('--accent-glow', `rgba(${parseInt(hex.substring(0,2), 16)},${parseInt(hex.substring(2,4), 16)},${parseInt(hex.substring(4,6), 16)},0.2)`);
                    }
                    const meta = document.querySelector('meta[name="theme-color"]');
                    if(meta) meta.setAttribute("content", profile.theme);
                } catch(e) {}
            }, [profile, iaState, streak, water, lastLog, groceryPrefs, currentProfileId]);

            // JEÛNE (Update chaque minute)
            useEffect(() => {
                const updateFasting = () => {
                    const totalMins = new Date().getHours() * 60 + new Date().getMinutes();
                    if (totalMins >= 1200 || totalMins < 720) {
                        let minsInFast = totalMins >= 1200 ? (totalMins - 1200) : (totalMins + 240);
                        setFastingProgress({ percent: (minsInFast / 960) * 100, status: "JEÛNE EN COURS", color: "#0a84ff" });
                    } else {
                        setFastingProgress({ percent: ((totalMins - 720) / 480) * 100, status: "FENÊTRE OUVERTE", color: "#30d158" });
                    }
                };
                updateFasting();
                const interval = setInterval(updateFasting, 60000);
                return () => clearInterval(interval);
            }, []);

            // --- FONCTIONS CENTRALES (COURSES & DIÈTE) ---
            const ratio = (profile.weight / 63) * iaState.cal_mult;
            
            const DIET_DATA = [
                { cat: "PROTÉINES", icon: "🥩", items: [
                    { id: "viande", base: "Blanc de poulet", daily: 200 },
                    { id: "poisson", base: "Thon au naturel", daily: 150 },
                    { id: "laitage", base: "Fromage blanc 0%", daily: 200 },
                    { id: "whey", base: "Whey isolate", daily: 30 }
                ]},
                { cat: "GLUCIDES", icon: "🌾", items: [
                    { id: "riz", base: "Riz basmati", daily: 150 },
                    { id: "avoine", base: "Flocons d'avoine", daily: 80 },
                    { id: "pates", base: "Lentilles vertes", daily: 150 }
                ]},
                { cat: "LÉGUMES", icon: "🥦", items: [
                    { id: "vert1", base: "Brocolis surgelés", daily: 200 },
                    { id: "vert2", base: "Épinards surgelés", daily: 200 },
                    { id: "crudites", base: "Crudités mixtes", daily: 100 }
                ]},
                { cat: "DIVERS", icon: "🫒", items: [
                    { id: "oleagineux", base: "Amandes natures", daily: 15 },
                    { id: "huile", base: "Huile d'olive", daily: 10 },
                    { id: "boissons", base: "Café ou Thé", daily: 0 }
                ]}
            ];

            const handlePref = (id, action) => {
                const newPrefs = { ...groceryPrefs };
                const pref = newPrefs[id] || { altIdx: 0, isEditing: false };
                const maxAlt = (ALTERNATIVES[DIET_DATA.flatMap(c=>c.items).find(i=>i.id===id).base] || []).length;

                if (action === 'edit') newPrefs[id] = { altIdx: Math.max(0, pref.altIdx), isEditing: true };
                if (action === 'cancel') newPrefs[id] = { altIdx: -1, isEditing: false };
                if (action === 'next') newPrefs[id] = { ...pref, altIdx: (pref.altIdx + 1) % maxAlt };
                if (action === 'save') newPrefs[id] = { ...pref, isEditing: false };
                
                setGroceryPrefs(newPrefs);
            };

            const getItemName = (id, base) => {
                const pref = groceryPrefs[id];
                if (pref && pref.altIdx >= 0 && ALTERNATIVES[base]) return ALTERNATIVES[base][pref.altIdx];
                return base;
            };

            const cleanString = (str) => str.replace(/[\u{1F300}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').trim();

            // --- VUES ---
            const renderHome = () => (
                <div className="app-content">
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 15 }}>
                        <div><div className="subtitle">STREAK</div><div style={{ fontSize: 32, fontFamily: "'Oswald'", color: "var(--accent)" }}>{streak} J</div></div>
                        <div style={{ textAlign: "right" }}><div className="subtitle">EAU (3L)</div><div style={{ display: "flex", gap: 3, marginTop: 5 }}>
                            {[0,1,2,3,4,5].map(i => <span key={i} className={`water-drop ${water > i ? 'active' : ''}`} onClick={() => setWater(w => w === i+1 ? i : i+1)}>💧</span>)}
                        </div></div>
                    </div>

                    <div className="card" style={{padding: 15}}>
                        <div className="card-header" style={{marginBottom: 5}}><strong style={{color:"var(--accent)", fontSize: 13}}>HORLOGE MÉTABOLIQUE</strong></div>
                        <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 5, fontWeight: 700 }}>{fastingProgress.status}</div>
                        <div className="progress-container"><div className="progress-bar" style={{ width: `${fastingProgress.percent}%`, background: fastingProgress.color }}></div></div>
                    </div>

                    <Accordion title="RÈGLES D'OR" icon="⚔️" isOpen={openAccordion === 'rules'} onClick={() => setOpenAccordion(openAccordion === 'rules' ? null : 'rules')}>
                        {[{ icon: "🎯", title: "Objectif Visuel Rapide", body: "On tape dans le gras sans cramer le muscle." },
                          { icon: "💧", title: "Lavage Interne", body: "3 à 4 litres d'eau. 500ml dès le réveil." },
                          { icon: "⏱", title: "Fenêtre 12h-20h", body: "Jeûne intermittent. Café noir uniquement le matin." },
                          { icon: "🧂", title: "Saveur Zéro Calorie", body: "Moutarde, curry, paprika, citron. Pas de sauces." }
                        ].map((r, i) => (
                            <div key={i} style={{marginBottom: 10}}><strong style={{color: "var(--text)", fontSize: 13}}>{r.icon} {r.title}</strong><div style={{fontSize: 12, color: "var(--muted)", marginTop: 2}}>{r.body}</div></div>
                        ))}
                    </Accordion>

                        <Accordion title={`BIOMÉTRIE (${profile.name})`} icon="👤" isOpen={openAccordion === 'bio'} onClick={() => setOpenAccordion(openAccordion === 'bio' ? null : 'bio')}>

                            <div className={`nav-item ${tab === 'courses' ? 'active' : ''}`} onClick={() => {setTab('courses'); setOpenAccordion(null);}}><span className="nav-icon">🛒</span><span>COURSES</span></div>
                            <div className={`nav-item ${tab === 'nutrition' ? 'active' : ''}`} onClick={() => {setTab('nutrition'); setOpenAccordion(null);}}><span className="nav-icon">🥩</span><span>DIÈTE</span></div>
                            <div className={`nav-item ${tab === 'workout' ? 'active' : ''}`} onClick={() => {setTab('workout'); setOpenAccordion(null);}}><span className="nav-icon">⚔️</span><span>SÉANCE</span></div>
                            <div className={`nav-item ${tab === 'profile' ? 'active' : ''}`} onClick={() => {setTab('profile'); setOpenAccordion(null);}}><span className="nav-icon">⚙️</span><span>PROFIL</span></div>
                        </div>
                    )}

                    {modalInfo && (
                        <div className="modal-overlay" onClick={() => setModalInfo(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h3 style={{margin: "0 0 10px", color: "var(--accent)"}}>EXÉCUTION</h3>
                                <p style={{fontSize: 13, margin: "5px 0", lineHeight: 1.4}}><strong>Muscles :</strong> {modalInfo.muscles}</p>
                                <p style={{fontSize: 13, margin: "5px 0", lineHeight: 1.4}}><strong>Tempo :</strong> {modalInfo.tempo}</p>
                                <div style={{background: "rgba(255,59,48,0.1)", border: "1px solid var(--accent)", padding: 10, borderRadius: 8, marginTop: 15}}>

                <div>
                    <label style={{display: "block", fontSize: 11, fontWeight: 700, marginBottom: 5}}>ÉNERGIE NERVEUSE</label>

        function ActiveWorkoutScreen({ workout, onClose, playBeep }) {
            const [timer, setTimer] = useState(0);
            const [isResting, setIsResting] = useState(false);
            const [checkedSets, setCheckedSets] = useState({});
            
            useEffect(() => {
                let interval;
                if (isResting && timer > 0) {
                    interval = setInterval(() => {
                        setTimer(t => {
                            if (t === 4) playBeep(440, 0.1, 0.2); if (t === 3) playBeep(440, 0.1, 0.2); if (t === 2) playBeep(440, 0.1, 0.2);

                            return t - 1;
                        });

                } else if (timer === 0) setIsResting(false);
                return () => clearInterval(interval);
            }, [isResting, timer]);

            return (
                <div className="active-workout-screen">
                    <div className="aw-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>

                        {isResting && (
                            <div style={{ background: "rgba(255,59,48,0.1)", border: "1px solid var(--accent)", borderRadius: 12, padding: 15, textAlign: "center", position: "sticky", top: 0, zIndex: 10, backdropFilter: "blur(10px)", marginBottom: 15 }}>

                                <div style={{ fontSize: 40, fontFamily: "'Oswald'", color: "var(--accent)", lineHeight: 1 }}>{`${Math.floor(timer / 60)}:${timer % 60 < 10 ? '0' : ''}${timer % 60}`}</div>
                            </div>
                        )}

                        {workout.blocks.map((b, exoIdx) => (
                            <div className="card" key={exoIdx} style={{padding: 15}}>
                                <strong style={{fontSize: 15, display: "block", marginBottom: 5, lineHeight: 1.3}}>{b.name}</strong>
                                <div style={{fontSize: 12, color: "var(--muted)", marginBottom: 10, lineHeight: 1.3}}>{b.reps}</div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                                    {Array.from({ length: b.sets }).map((_, setIdx) => {
                                        const isChecked = checkedSets[`${exoIdx}_${setIdx}`];
                                        return (
                                            <div key={setIdx} onClick={() => { if(!isChecked) { setCheckedSets(p => ({...p, [`${exoIdx}_${setIdx}`]: true})); setTimer(90); setIsResting(true); } }}
                                                style={{ width: 40, height: 40, borderRadius: "50%", border: `2px solid ${isChecked ? 'var(--accent)' : 'var(--border)'}`, background: isChecked ? 'var(--accent)' : 'transparent', display: "flex", justifyContent: "center", alignItems: "center", color: isChecked ? '#000' : 'var(--muted)', fontWeight: 900, cursor: "pointer", transition: "0.2s" }}>
                                                {isChecked ? '✓' : setIdx + 1}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="aw-footer"><button className="btn" onClick={() => { alert("Séance terminée. Beau travail."); onClose(); }}>TERMINER SÉANCE</button></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
